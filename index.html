<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的個人網站</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            background-color: #f4f4f4;
        }
        header {
            background: #333;
            color: white;
            padding: 20px;
            font-size: 24px;
        }
        nav {
            background: #444;
            padding: 10px;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
        }
        section {
            padding: 20px;
            background: white;
            margin: 20px auto;
            max-width: 800px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        footer {
            background: #333;
            color: white;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>
    <header>歡迎來到我的網站</header>
    <nav>
        <a href="#about">關於我</a>
        <a href="#projects">專案</a>
        <a href="#contact">聯絡方式</a>
    </nav>
    
    <section id="about">
        <h2>關於我</h2>
        <p>你好！我是 [你的名字]，目前是高中生，對於學術研究與技術開發有濃厚興趣。</p>
    </section>
    
    <section id="projects">
        <h2>我的專案</h2>
        <p>這裡是我曾經參與過的專案與研究，例如科展、學習成果等。</p>
    </section>
    
    <section id="contact">
        <h2>聯絡方式</h2>
        <p>Email: your.email@example.com</p>
    </section>
    
    <footer>
        &copy; 2025 我的個人網站
    </footer>
</body>
</html>
